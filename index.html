<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Demo Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      height: 100vh;
    }

    .page-content {
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
    }

    .page-content h1 { color: #333; margin-bottom: 16px; }
    .page-content p { color: #666; line-height: 1.6; margin-bottom: 12px; }

    #chat-bubble {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      background: #c8873a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      font-size: 28px;
      transition: transform 0.2s;
      z-index: 1000;
    }

    #chat-bubble:hover { transform: scale(1.1); }

    #chat-container {
      position: fixed;
      bottom: 100px;
      right: 24px;
      width: 380px;
      height: 550px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 999;
      transform: scale(0);
      transform-origin: bottom right;
      transition: transform 0.3s ease;
    }

    #chat-container.open { transform: scale(1); }

    #chat-header {
      background: #c8873a;
      color: white;
      padding: 16px;
      font-weight: bold;
      font-size: 15px;
      text-align: center;
      flex-shrink: 0;
    }

    #chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
    }

    .message.bot { background: #f0f0f0; align-self: flex-start; }
    .message.user { background: #c8873a; color: white; align-self: flex-end; }

    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 10px 14px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    #chat-input {
      display: flex;
      padding: 12px;
      border-top: 1px solid #eee;
      gap: 8px;
      flex-shrink: 0;
    }

    #chat-input input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    #chat-input button {
      padding: 10px 16px;
      background: #c8873a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    #chat-input button:hover { background: #a86e2e; }
    #chat-input button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="page-content">
    <h1 id="page-title"></h1>
    <p>Bienvenue sur notre site ! N'hésitez pas à nous poser vos questions via le chat en bas à droite ! 👉</p>
  </div>

  <div id="chat-bubble" onclick="toggleChat()">💬</div>

  <div id="chat-container">
    <div id="chat-header"></div>
    <div id="chat-messages">
      <div class="message bot">Bonjour ! Comment puis-je vous aider ? 😊</div>
    </div>
    <div id="chat-input">
      <input type="text" id="user-input" placeholder="Posez votre question..." />
      <button id="send-btn" onclick="sendMessage()">Envoyer</button>
    </div>
  </div>

  <script>
    const input = document.getElementById('user-input')
    const messages = document.getElementById('chat-messages')
    const sendBtn = document.getElementById('send-btn')
    const container = document.getElementById('chat-container')
    const bubble = document.getElementById('chat-bubble')

    let conversationHistory = []
    let isOpen = false

    async function loadConfig() {
      const res = await fetch('/config')
      const config = await res.json()
      document.getElementById('page-title').textContent = '🏪 ' + config.nom
      document.getElementById('chat-header').textContent = '💬 ' + config.nom
    }

    loadConfig()

    function toggleChat() {
      isOpen = !isOpen
      container.classList.toggle('open')
      bubble.textContent = isOpen ? '✕' : '💬'
      if (isOpen) input.focus()
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage()
    })

    async function sendMessage() {
      const text = input.value.trim()
      if (!text) return

      sendBtn.disabled = true
      input.disabled = true

      conversationHistory.push({ role: 'user', content: text })
      addMessage(text, 'user')
      input.value = ''

      const typingDiv = addTyping()

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory })
        })

        const data = await response.json()
        typingDiv.remove()
        addMessage(data.reply, 'bot')
        conversationHistory.push({ role: 'assistant', content: data.reply })

      } catch (error) {
        typingDiv.remove()
        addMessage("Désolé, une erreur est survenue.", 'bot')
      }

      sendBtn.disabled = false
      input.disabled = false
      input.focus()
    }

    function addMessage(text, sender) {
      const div = document.createElement('div')
      div.classList.add('message', sender)
      div.textContent = text
      messages.appendChild(div)
      messages.scrollTop = messages.scrollHeight
      return div
    }

    function addTyping() {
      const div = document.createElement('div')
      div.classList.add('message', 'bot', 'typing')
      div.innerHTML = '<span></span><span></span><span></span>'
      messages.appendChild(div)
      messages.scrollTop = messages.scrollHeight
      return div
    }
  </script>

</body>
</html>
